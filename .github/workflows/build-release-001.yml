name: 💻 固件编译

# 新增：定时触发（北京时间凌晨2点） + 保留手动触发
on:
  schedule:
    - cron: '0 18 * * *'  # UTC时间18点 = 北京时间凌晨2点（UTC+8）
  workflow_dispatch:
    inputs:
      device:
        description: '➡️ 选择需构建固件的设备型号'
        required: true
        default: 'all-mt7981-devices'
        type: choice
        options:
          - 'abt-asr3000'
          - 'cetron-ct3003'
          - 'cmcc-a10'
          - 'cmcc-rax3000m-emmc'
          - 'cmcc-rax3000m'
          - 'cmcc-rax3000me'
          - 'cmcc-xr30'
          - 'cmcc-xr30-emmc'          
          - 'umi-uax3000e'          
          - 'h3c-magic-nx30-pro'
          - 'imou-lc-hx3001'
          - 'nokia-ea0326gmp'
          - 'newland-nl-wr8103'
          - 'philips-hy3000'
          - 'qihoo-360t7'
          - 'sl-3000'
          - 'sl-3000-emmc'
          - 'xiaomi-mi-router-ax3000t'         
          - 'clx-s20p'
          - 'ikuai-q6000'
          - 'ikuai-q6000-emmc'
          - 'netcore-n60'
          - 'netcore-n60-pro'
          - 'netcore-n60-pro-512rom'
          - 'xiaomi-redmi-router-ax6000'
          - 'xiaomi-redmi-router-ax6000-512rom'
          - 'jdcloud-re-cp-03'
          - 'all-mt7981-devices'
          - 'all-mt7986-devices'
          - 'all-high-power-devices'
      lan_addr:
        description: '🌐 设置默认 LAN IP 地址'
        required: true
        default: '10.0.0.1'
        type: string
      wifi_name:
        description: '🛜 设置默认 WIFI 名称（可选，默认ZeroWrt）'
        required: false
        default: 'ZeroWrt'
        type: string        
      root_password:
        description: '🔐 设置默认 root 密码（可选，默认password）'
        required: false
        default: 'password'
        type: string
      build_options:
        description: '🔧 构建选项（可输入多个，用空格分隔）'
        required: false
        default: 'BUILD_FAST=y ENABLE_BPF=y'
        type: string

jobs:
  build:
    # 适配定时构建：手动触发显示选择的设备，定时触发显示默认设备
    name: Build ${{ github.event.inputs.device || 'netcore-n60' }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      continue-on-error: true
      uses: actions/checkout@main
      with:
        path: immortalwrt-mt798x-action

    - name: Setup variables
      run: |
        sudo timedatectl set-timezone 'Asia/Shanghai'
        git config --global user.name 'actions'
        git config --global user.email 'action@github.com'
        echo build_dir="/builder" >> "$GITHUB_ENV"
        # 新增1：定义定时构建的默认参数（不影响手动触发）
        echo "DEFAULT_DEVICE=netcore-n60" >> "$GITHUB_ENV"
        echo "DEFAULT_LAN=10.0.0.1" >> "$GITHUB_ENV"
        echo "DEFAULT_WIFI=ZeroWrt" >> "$GITHUB_ENV"
        echo "DEFAULT_PW=password" >> "$GITHUB_ENV"
        echo "DEFAULT_OPTIONS=BUILD_FAST=y ENABLE_BPF=y" >> "$GITHUB_ENV"
        # 新增2：生成日期（格式：25.12.24），用于标签拼接
        echo "BUILD_DATE=$(date +'%y.%m.%d')" >> "$GITHUB_ENV"

    - name: Show system
      run: |
        echo -e "\n\e[1;32mCPU:\e[0m"
        echo "$(grep 'model name' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}') ($(grep 'cpu MHz' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}')MHz) x $(grep processor /proc/cpuinfo  | wc -l)"
        echo -e "\n\e[1;32mMemory:\e[0m"
        free -h
        echo -e "\n\e[1;32mStorage:\e[0m"
        df -Th / /mnt
        echo -e "\n\e[1;32mSystem:\e[0m"
        lsb_release -a
        echo -e "\n\e[1;32mKernel:\e[0m"
        uname -a
        echo

    # 完全保留你原有的 Caddy Server 代码，未做任何修改
    - name: Install Caddy Server
      run: |
        echo "📥 下载 Caddy v2.10.2..."
        sudo curl -sL -o caddy.tar.gz https://github.com/caddyserver/caddy/releases/download/v2.10.2/caddy_2.10.2_linux_amd64.tar.gz
        echo "📦 解压并安装..."
        sudo tar -xzf caddy.tar.gz -C /usr/bin caddy
        sudo tar -xzf caddy.tar.gz -C /usr/bin caddy
        
        echo "🧹 清理临时文件..."      
        rm caddy.tar.gz
        
        echo "✅ 验证安装..."
        /usr/bin/caddy version

        echo "🚀 启动 Caddy 文件服务器..."
        echo ":8080 {" > caddyfile
        echo "    root * $(pwd)/immortalwrt-mt798x-action" >> caddyfile
        echo "    file_server browse" >> caddyfile
        echo "}" >> caddyfile
        sudo /usr/bin/caddy start --config caddyfile --adapter caddyfile

    - name: Free disk space
      uses: sbwml/actions@free-disk
      with:
        build-mount-path: /builder

    - name: Build System Setup
      uses: sbwml/actions@openwrt-build-setup

    - name: Install LLVM
      uses: sbwml/actions@install-llvm

    - name: Compile OpenWrt
      working-directory: /builder
      id: compile
      continue-on-error: true
      run: |
        # 新增3：适配定时/手动构建的参数传递（兜底默认值）
        DEVICE="${{ github.event.inputs.device || env.DEFAULT_DEVICE }}"
        BUILD_OPT="${{ github.event.inputs.build_options || env.DEFAULT_OPTIONS }}"
        LAN="${{ github.event.inputs.lan_addr || env.DEFAULT_LAN }}"
        WIFI_NAME="${{ github.event.inputs.wifi_name || env.DEFAULT_WIFI }}"
        ROOT_PASSWORD="${{ github.event.inputs.root_password || env.DEFAULT_PW }}"
        
        # 保留你原有的参数导出逻辑，仅替换为上面的兼容变量
        export $BUILD_OPT LAN=$LAN WIFI_NAME=$WIFI_NAME
        [ -n "$ROOT_PASSWORD" ] && export ROOT_PASSWORD="$ROOT_PASSWORD"
        
        # 执行编译脚本（保留原有逻辑）
        bash <(curl -sS http://127.0.0.1:8080/build.sh) $DEVICE
        cd openwrt
        tags=$(git branch --show-current)
        # 新增4：拼接带日期的标签（格式：openwrt-24.10-6.6-25.12.24）
        final_tag="openwrt-${tags}-${{ env.BUILD_DATE }}"
        echo "latest_release=$final_tag" >>$GITHUB_ENV

    - name: Extensive logs after a failed compilation
      working-directory: /builder
      if: steps.compile.outcome == 'failure'
      run: |
        cd openwrt
        make V=s
        
    - name: Prepare Firmware Files
      working-directory: /builder
      run: |
        mkdir -p rom
        
        # 自动查找并复制所有 sysupgrade 固件
        find openwrt/bin/targets -name "*sysupgrade.bin" -type f -exec cp -v {} rom/ \;
        
        # 验证
        if [ ! -f rom/*-sysupgrade.bin ]; then
          echo "❌ 固件复制失败，实际文件结构："
          find openwrt/bin -type f -name "*.bin"
          exit 1
        fi
        
        echo "✅ 成功复制固件："
        ls -lh rom/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        # 适配：artifact名称带日期和设备
        name: ${{ github.event.inputs.device || env.DEFAULT_DEVICE }}-${{ env.latest_release }}
        path: ${{ env.build_dir }}/rom/*

    - name: Create release
      continue-on-error: true
      uses: ncipollo/release-action@v1
      with:
        # 新增5：发布名称和标签都带日期（如openwrt-24.10-6.6-25.12.24）
        name: ${{ env.latest_release }}
        allowUpdates: true
        tag: ${{ env.latest_release }}
        commit: main
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.build_dir }}/rom/*
